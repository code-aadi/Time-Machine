<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
         font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        
    }
   h1{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
   } 
   .para{
   font-size: 18px;
    font-weight: 400;
    
   }
   .main{
display: flex;
justify-content: center;
align-items: center;
flex-direction: column;
background-color: #ebdddd;
height: 250px;
width: 50vw;
margin: auto;
border-radius: 10px;


   }
   input{
    width: 400px;
    height: 30px;
    padding-left: 10px ;
    font-size: 20px;
    
   }
   .submit{
    margin-top: 15px;
    padding: 10px;
    background-color: rgb(26, 92, 150);
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 17px;
   }
   .messages{
    height: 5px;

   }
   .empty-value{
    border: 2px solid red;
   }
   .dots::after{
            content: '...';
            animation: dots 500ms infinite;
        }
   

   @keyframes dots {
    0%{content: "";}
    20%{content: ".";}
    40%{content: "..";}
    60%{content: "...";}
   }
  
</style>
<body>
    <h1>Time Travel Machine</h1>
<div class="main">
    <p class="para">Enter the year name here where you want to go</p>
    <input type="number" name="" id="inp" placeholder="Enter year here...">
<button type="submit" class="submit">Submit</button>
<p class="messages"></p>
</div> 
   <script src="script.js"></script> 
</body>
</html>
